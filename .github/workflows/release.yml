name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Write signing key
        shell: bash
        run: |
          if printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | base64 --decode > "$RUNNER_TEMP/signing.key" 2>/dev/null; then
            echo "Decoded base64 signing key into $RUNNER_TEMP/signing.key"
          else
            printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "$RUNNER_TEMP/signing.key"
            echo "Wrote raw signing key into $RUNNER_TEMP/signing.key"
          fi
          chmod 600 "$RUNNER_TEMP/signing.key"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}/signing.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ZChat ${{ github.ref_name }}
          releaseBody: See release notes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
